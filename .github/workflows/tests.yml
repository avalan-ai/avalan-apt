name: tests

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    name: pytest (${{ matrix.os }}, py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # macos-13 dropped: GitHub's Intel macOS hosted runners have
        # essentially no capacity and jobs sit queued indefinitely.
        # macos-14 (Apple Silicon) covers the dev-host platform; both
        # ubuntu LTS cells stay because Noble is the deployment target.
        os: [ubuntu-24.04, ubuntu-22.04, macos-14]
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install test dependencies
        run: python -m pip install --upgrade pip pytest packaging

      - name: Run pytest
        run: pytest tests/ -v

  generate-control-drift:
    name: generate-control no-drift
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Re-run scripts/generate-control --update
        run: scripts/generate-control --update

      - name: Confirm debian/control matches dep-map
        run: |
          if ! git diff --exit-code -- debian/control; then
            echo "debian/control drifted from debian/dependency-map.toml" >&2
            echo "Run scripts/generate-control --update and commit the result." >&2
            exit 1
          fi
