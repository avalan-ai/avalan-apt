name: apt

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Nightly run at 05:00 UTC -- exercises the heavy gates
    # (install-smoke, autopkgtest, install-cycle; eventually
    # clean-build) that don't fire on PR triggers.
    - cron: '0 5 * * *'
  # workflow_dispatch lets us drive a nightly-only gate
  # (install-cycle) by hand without having to wait until 05:00 UTC.
  workflow_dispatch:

concurrency:
  group: apt-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-audit:
    name: dependency-audit
    runs-on: ubuntu-24.04
    steps:
      - name: Check out avalan-apt
        uses: actions/checkout@v4

      - name: Check out homebrew-avalan as a sibling
        uses: actions/checkout@v4
        with:
          repository: avalan-ai/homebrew-avalan
          path: homebrew-avalan-checkout

      - name: Place homebrew-avalan at the path check-dependencies expects
        run: mv homebrew-avalan-checkout ../homebrew-avalan

      - name: Cache apt archives
        uses: ./.github/actions/cache-apt
        with:
          key: dependency-audit-${{ hashFiles('.github/workflows/apt.yml') }}

      - name: Install host tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ca-certificates \
            python3-packaging \
            wget

      - name: Cache Avalan sdist
        uses: actions/cache@v4
        with:
          path: build/avalan_*.orig.tar.gz
          key: avalan-sdist-${{ hashFiles('release.toml') }}

      - name: Fetch and overlay the upstream Avalan sdist
        run: scripts/prepare-source

      - name: Audit dependency-map.toml
        run: scripts/check-dependencies

  metadata-lint:
    name: metadata-lint
    runs-on: ubuntu-24.04
    steps:
      - name: Check out avalan-apt
        uses: actions/checkout@v4

      - name: Cache apt archives
        uses: ./.github/actions/cache-apt
        with:
          key: metadata-lint-${{ hashFiles('.github/workflows/apt.yml') }}

      - name: Install host tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            ca-certificates \
            debhelper \
            devscripts \
            dh-python \
            dpkg-dev \
            fakeroot \
            lintian \
            pybuild-plugin-pyproject \
            python3-all \
            python3-all-dev \
            python3-build \
            python3-installer \
            python3-poetry-core \
            python3-poetry-dynamic-versioning \
            python3-pytest \
            wget

      - name: Cache Avalan sdist
        uses: actions/cache@v4
        with:
          path: build/avalan_*.orig.tar.gz
          key: avalan-sdist-${{ hashFiles('release.toml') }}

      - name: Prepare upstream sdist
        run: scripts/prepare-source

      - name: Source build (Avalan)
        run: |
          set -o pipefail
          scripts/build-source 2>&1 | tee build/build.log

      - name: Scan build log for forbidden network calls
        run: scripts/scan-build-log build/build.log

      - name: Lintian (pedantic, fail on warnings)
        run: scripts/lint-package

  binary-build:
    name: binary-build
    runs-on: ubuntu-24.04
    steps:
      - name: Check out avalan-apt
        uses: actions/checkout@v4

      - name: Cache apt archives
        uses: ./.github/actions/cache-apt
        with:
          key: binary-build-${{ hashFiles('.github/workflows/apt.yml') }}

      - name: Install host tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            ca-certificates \
            debhelper \
            devscripts \
            dh-python \
            dpkg-dev \
            fakeroot \
            lintian \
            pybuild-plugin-pyproject \
            python3-all \
            python3-all-dev \
            python3-build \
            python3-installer \
            python3-poetry-core \
            python3-poetry-dynamic-versioning \
            python3-pytest \
            wget

      - name: Cache Avalan sdist
        uses: actions/cache@v4
        with:
          path: build/avalan_*.orig.tar.gz
          key: avalan-sdist-${{ hashFiles('release.toml') }}

      - name: Prepare upstream sdist
        run: scripts/prepare-source

      - name: Binary build (Avalan)
        run: |
          set -o pipefail
          scripts/build-binary 2>&1 | tee build/binary-build.log

      - name: Scan binary build log for forbidden network calls
        run: scripts/scan-build-log build/binary-build.log

      - name: Confirm wheel METADATA version matches debian/changelog
        run: |
          set -eu
          deb=$(ls build/avalan_*_all.deb | head -n1)
          test -n "$deb"
          expected=$(dpkg-parsechangelog -l debian/changelog -S Version \
              | sed 's/-.*//')
          actual=$(dpkg-deb --fsys-tarfile "$deb" \
              | tar -tf - 2>/dev/null \
              | sed -n 's|.*/avalan-\([^/]*\)\.dist-info/.*|\1|p' \
              | sort -u)
          test -n "$actual"
          if [ "$actual" != "$expected" ]; then
              echo "FATAL: wheel METADATA version '$actual' differs from changelog upstream version '$expected'" >&2
              exit 1
          fi
          echo "wheel METADATA version matches changelog: $actual"

      - name: Upload Avalan .deb for install-smoke
        uses: actions/upload-artifact@v4
        with:
          name: install-smoke-debs-avalan
          path: build/avalan_*_all.deb
          if-no-files-found: error
          retention-days: 1

  dep-build:
    name: dep-build (${{ matrix.dep }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      # One cell per hand-packaged dep landing in the Avalan PPA on
      # Noble. Covers pypi-sdist overlays under packages/<dep>/ plus
      # the debian-rebuild rows whose sid Build-Depends resolve from
      # Noble alone (jinja2, google-auth, annotated-types). Rows
      # whose build-deps pull other PPA packages (pydantic, openai)
      # live in the dep-build-chain job below instead, which dpkg-i's
      # each prerequisite before the next build. pydantic-core is
      # `cargo_vendor = true`, so the prep step runs `cargo vendor`
      # (network-allowed) before the build step which stays offline.
      matrix:
        dep:
          - aioboto3
          - aiobotocore
          - aioitertools
          - annotated-types
          - anthropic
          - anyio
          - boto3
          - botocore
          - diffusers
          - google-auth
          - google-genai
          - httpx-sse
          - humanize
          - huggingface-hub
          - jinja2
          - mcp
          - pydantic-core
          - s3transfer
          - SQLAlchemy
          - typing-inspection
          - websockets
    steps:
      - name: Check out avalan-apt
        uses: actions/checkout@v4

      - name: Cache apt archives
        uses: ./.github/actions/cache-apt
        with:
          key: dep-build-${{ hashFiles('.github/workflows/apt.yml') }}

      - name: Install host tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            ca-certificates \
            cargo \
            cython3 \
            debhelper \
            devscripts \
            dh-python \
            dpkg-dev \
            fakeroot \
            flit \
            libfreetype-dev \
            libjpeg-dev \
            liblcms2-dev \
            libopenjp2-7-dev \
            libtiff-dev \
            libwebp-dev \
            lintian \
            openstack-pkg-tools \
            pybuild-plugin-pyproject \
            python3-aiohttp \
            python3-all \
            python3-all-dev \
            python3-babel \
            python3-cachetools \
            python3-cryptography \
            python3-flask \
            python3-hatch-fancy-pypi-readme \
            python3-hatch-vcs \
            python3-hatchling \
            python3-installer \
            python3-jwt \
            python3-markupsafe \
            python3-maturin \
            python3-numpy \
            python3-openssl \
            python3-packaging \
            python3-pallets-sphinx-themes \
            python3-pdm-backend \
            python3-poetry-core \
            python3-pretend \
            python3-pyasn1 \
            python3-pyasn1-modules \
            python3-pygments \
            python3-pytest \
            python3-pytest-asyncio \
            python3-pytest-localserver \
            python3-pytest-mock \
            python3-pytest-runner \
            python3-pytest-xdist \
            python3-pyu2f \
            python3-requests \
            python3-responses \
            python3-rsa \
            python3-setuptools \
            python3-setuptools-scm \
            python3-sphinx \
            python3-sphinx-issues \
            python3-trio \
            quilt \
            rustc \
            wget \
            xz-utils \
            zlib1g-dev

      - name: Cache ${{ matrix.dep }} source artifacts
        uses: actions/cache@v4
        with:
          path: |
            build/deps/*.orig.tar.gz
            build/deps/*.orig.tar.xz
            build/deps/*.orig.tar.bz2
            build/deps/*.debian.tar.gz
            build/deps/*.debian.tar.xz
            build/deps/*.dsc
          key: dep-sdist-${{ matrix.dep }}-${{ hashFiles('debian/dependency-map.toml') }}

      - name: Prepare ${{ matrix.dep }} source
        env:
          DEP: ${{ matrix.dep }}
        run: scripts/prepare-dep-source "$DEP"

      - name: Build ${{ matrix.dep }} binary .deb
        env:
          DEP: ${{ matrix.dep }}
        run: |
          set -o pipefail
          mkdir -p build/deps
          scripts/build-dep-package "$DEP" --mode binary 2>&1 \
            | tee "build/deps/${DEP}-build.log"

      - name: Scan build log for forbidden network calls
        env:
          DEP: ${{ matrix.dep }}
        run: scripts/scan-build-log "build/deps/${DEP}-build.log"

      - name: Lintian the .changes
        env:
          DEP: ${{ matrix.dep }}
        run: |
          set -e
          # PyPI name and Debian source name differ for some rows
          # (e.g. `packaging` -> `python-packaging`); each cell builds
          # exactly one source, so the binary .changes is the sole
          # non-_source.changes file under build/deps/.
          changes=$(ls -1 build/deps/*_*_*.changes | grep -v _source.changes | head -n1)
          test -n "$changes"
          # debian-rebuild rows ship sid's source unchanged; we don't
          # carry Avalan-specific patches, so we don't fail on
          # warnings that originate in the upstream source (e.g. sid's
          # jinja2 omits Priority on its binary packages). Errors
          # still gate.
          provenance=$(python3 -c "import os, tomllib; data = tomllib.load(open('debian/dependency-map.toml', 'rb')); print(next((d.get('provenance', '') for d in data['dep'] if d['pypi_name'] == os.environ['DEP']), ''))")
          fail_on=error,warning
          if [ "$provenance" = "debian-rebuild" ]; then
              fail_on=error
          fi
          lintian --pedantic --info --fail-on "$fail_on" "$changes"

      - name: Upload ${{ matrix.dep }} .deb for install-smoke
        uses: actions/upload-artifact@v4
        with:
          name: install-smoke-debs-dep-${{ matrix.dep }}
          path: build/deps/python3-*.deb
          if-no-files-found: error
          retention-days: 1

  dep-build-chain:
    # The two PPA leaves whose Build-Depends pull other Avalan-PPA
    # packages: pydantic needs python3-annotated-types +
    # python3-pydantic-core, openai then needs python3-anyio +
    # python3-pydantic on top. dpkg-i each prerequisite into the
    # runner before the next build so dpkg-checkbuilddeps sees what
    # Launchpad's builders would after a PPA upload. The chain
    # rebuilds the three prereqs locally instead of reusing matrix
    # artifacts to keep the job self-contained.
    name: dep-build-chain
    runs-on: ubuntu-24.04
    steps:
      - name: Check out avalan-apt
        uses: actions/checkout@v4

      - name: Cache apt archives
        uses: ./.github/actions/cache-apt
        with:
          key: dep-build-chain-${{ hashFiles('.github/workflows/apt.yml') }}

      - name: Install host tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            ca-certificates \
            cargo \
            cython3 \
            debhelper \
            devscripts \
            dh-python \
            dpkg-dev \
            fakeroot \
            flit \
            lintian \
            pybuild-plugin-pyproject \
            python3-all \
            python3-all-dev \
            python3-distro \
            python3-hatch-fancy-pypi-readme \
            python3-hatch-vcs \
            python3-hatchling \
            python3-httpx \
            python3-installer \
            python3-maturin \
            python3-packaging \
            python3-pytest \
            python3-setuptools \
            python3-setuptools-scm \
            python3-sniffio \
            python3-tqdm \
            python3-typing-extensions \
            quilt \
            rustc \
            wget \
            xz-utils

      - name: Cache chain source artifacts
        uses: actions/cache@v4
        with:
          path: |
            build/deps/*.orig.tar.gz
            build/deps/*.orig.tar.xz
            build/deps/*.orig.tar.bz2
            build/deps/*.debian.tar.gz
            build/deps/*.debian.tar.xz
            build/deps/*.dsc
          key: dep-sdist-chain-${{ hashFiles('debian/dependency-map.toml') }}

      - name: Build annotated-types
        run: |
          set -o pipefail
          mkdir -p build/deps
          scripts/prepare-dep-source annotated-types
          scripts/build-dep-package annotated-types --mode binary 2>&1 \
            | tee build/deps/annotated-types-build.log

      - name: Install python3-annotated-types
        run: |
          set -e
          deb=$(ls build/deps/python3-annotated-types_*+noble1_*.deb \
                | grep -v dbgsym | head -n1)
          test -n "$deb"
          sudo apt-get install -y --no-install-recommends "./$deb"

      - name: Build pydantic-core
        run: |
          set -o pipefail
          scripts/prepare-dep-source pydantic-core
          scripts/build-dep-package pydantic-core --mode binary 2>&1 \
            | tee build/deps/pydantic-core-build.log

      - name: Install python3-pydantic-core
        run: |
          set -e
          deb=$(ls build/deps/python3-pydantic-core_*~noble1_*.deb \
                | grep -v dbgsym | head -n1)
          test -n "$deb"
          sudo apt-get install -y --no-install-recommends "./$deb"

      - name: Build anyio
        run: |
          set -o pipefail
          scripts/prepare-dep-source anyio
          scripts/build-dep-package anyio --mode binary 2>&1 \
            | tee build/deps/anyio-build.log

      - name: Install python3-anyio
        run: |
          set -e
          deb=$(ls build/deps/python3-anyio_*~noble1_*.deb \
                | grep -v dbgsym | head -n1)
          test -n "$deb"
          sudo apt-get install -y --no-install-recommends "./$deb"

      - name: Build pydantic
        run: |
          set -o pipefail
          scripts/prepare-dep-source pydantic
          scripts/build-dep-package pydantic --mode binary 2>&1 \
            | tee build/deps/pydantic-build.log

      - name: Install python3-pydantic
        run: |
          set -e
          deb=$(ls build/deps/python3-pydantic_*~noble1_*.deb \
                | grep -v dbgsym | head -n1)
          test -n "$deb"
          sudo apt-get install -y --no-install-recommends "./$deb"

      - name: Build openai
        run: |
          set -o pipefail
          scripts/prepare-dep-source openai
          scripts/build-dep-package openai --mode binary 2>&1 \
            | tee build/deps/openai-build.log

      - name: Scan all chain build logs
        run: |
          set -e
          for log in build/deps/annotated-types-build.log \
                     build/deps/pydantic-core-build.log \
                     build/deps/anyio-build.log \
                     build/deps/pydantic-build.log \
                     build/deps/openai-build.log; do
              scripts/scan-build-log "$log"
          done

      - name: Lintian pydantic and openai
        run: |
          set -e
          # Only the pypi-sdist binary builds get gated here; source
          # .changes from earlier runs (none in CI, but glob safety)
          # are filtered out. annotated-types/pydantic-core/anyio are
          # already gated in the dep-build matrix; re-running lintian
          # on them here would duplicate work.
          for changes in build/deps/pydantic_*.changes \
                         build/deps/openai_*.changes; do
              case "$changes" in
                  *_source.changes) continue ;;
              esac
              test -f "$changes"
              lintian --pedantic --info --fail-on error,warning \
                  "$changes"
          done

      - name: Upload pydantic + openai .debs for install-smoke
        # Only the two chain leaves; annotated-types, pydantic-core,
        # and anyio also come out of this job but are already uploaded
        # by their dep-build matrix cells.
        uses: actions/upload-artifact@v4
        with:
          name: install-smoke-debs-chain
          path: |
            build/deps/python3-pydantic_*.deb
            build/deps/python3-openai_*.deb
          if-no-files-found: error
          retention-days: 1

  install-smoke:
    # Drops the Avalan .deb + every PPA-side dep .deb into a fresh
    # `ubuntu:24.04` Docker container, apt-installs them so Noble's
    # archive supplies the remaining transitive runtime deps, and
    # then runs debian/tests/smoke against the result. Gates on push
    # to main + the nightly schedule so PR runtime stays bounded;
    # the underlying build matrices still run on every PR, so a
    # broken .deb fails fast before this job ever fires.
    name: install-smoke
    runs-on: ubuntu-24.04
    needs:
      - binary-build
      - dep-build
      - dep-build-chain
    if: github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Check out avalan-apt
        uses: actions/checkout@v4

      - name: Download every install-smoke .deb artifact
        uses: actions/download-artifact@v4
        with:
          path: build/install-smoke
          pattern: install-smoke-debs-*
          merge-multiple: true

      - name: List downloaded .debs
        run: ls -la build/install-smoke/

      - name: Install Avalan + deps in ubuntu:24.04 and run smoke
        run: |
          set -eux
          docker run --rm \
              --volume "$PWD:/work" \
              --workdir /work \
              --env DEBIAN_FRONTEND=noninteractive \
              ubuntu:24.04 \
              bash -euxc '
                  apt-get update
                  apt-get install -y --no-install-recommends \
                      ca-certificates \
                      dpkg-dev
                  # apt-get install ./*.deb lets apt resolve every
                  # transitive Depends: from Noble while pulling our
                  # local .debs in for the PPA-side rows.
                  apt-get install -y --no-install-recommends \
                      ./build/install-smoke/*.deb
                  ./debian/tests/smoke
              '

  autopkgtest:
    # Same .deb set as install-smoke, but drives the smoke test via
    # `autopkgtest` instead of invoking debian/tests/smoke directly.
    # autopkgtest exercises the same script through the proper
    # harness (AUTOPKGTEST_TMP, restrictions, structured pass/fail),
    # which is what Launchpad's autopkgtest queue uses against the
    # PPA -- catching shape regressions in debian/tests/control here
    # is cheaper than catching them post-upload. Gates on push +
    # nightly schedule for the same reason as install-smoke.
    name: autopkgtest
    runs-on: ubuntu-24.04
    needs:
      - binary-build
      - dep-build
      - dep-build-chain
    if: github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Check out avalan-apt
        uses: actions/checkout@v4

      - name: Download every install-smoke .deb artifact
        uses: actions/download-artifact@v4
        with:
          path: build/install-smoke
          pattern: install-smoke-debs-*
          merge-multiple: true

      - name: Run autopkgtest in ubuntu:24.04
        run: |
          set -eux
          docker run --rm \
              --volume "$PWD:/work" \
              --workdir /work \
              --env DEBIAN_FRONTEND=noninteractive \
              ubuntu:24.04 \
              bash -euxc '
                  apt-get update
                  apt-get install -y --no-install-recommends \
                      autopkgtest \
                      ca-certificates \
                      dpkg-dev
                  # Install the full closure first so debian/tests/smoke
                  # finds every import it expects. autopkgtest --null
                  # reuses the current shell as the test environment,
                  # so the install has to happen before the autopkgtest
                  # call -- the null backend will not install for us.
                  apt-get install -y --no-install-recommends \
                      ./build/install-smoke/*.deb
                  # --no-built-binaries: we are not building from
                  # source, we already installed the .debs above.
                  # /work as the test argument tells autopkgtest to
                  # read debian/tests/control out of the source tree.
                  autopkgtest --no-built-binaries /work -- null
              '

  install-cycle:
    # install/remove/purge/reinstall lifecycle gate. Replaces a
    # piuparts job: piuparts was dropped from Ubuntu Noble's
    # universe (last seen in Jammy, gone in Noble + Oracular), so
    # there's no apt-installable piuparts to drive. The script
    # under scripts/install-cycle reproduces the cycle's
    # essential checks for our package -- install the closure,
    # snapshot the dpkg file list, remove, dpkg --purge, assert
    # nothing remains under /usr/lib/python3/dist-packages/
    # avalan* (the canonical pybuild postrm gripe), reinstall,
    # and confirm the second install lands bit-identically.
    # Gates on the nightly schedule plus workflow_dispatch so we
    # can poke it from `gh workflow run` when iterating on
    # packaging changes.
    name: install-cycle
    runs-on: ubuntu-24.04
    needs:
      - binary-build
      - dep-build
      - dep-build-chain
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Check out avalan-apt
        uses: actions/checkout@v4

      - name: Download every install-smoke .deb artifact
        uses: actions/download-artifact@v4
        with:
          path: build/install-smoke
          pattern: install-smoke-debs-*
          merge-multiple: true

      - name: Run install/remove/purge/reinstall cycle in ubuntu:24.04
        run: |
          set -eux
          docker run --rm \
              --volume "$PWD:/work" \
              --workdir /work \
              --env DEBIAN_FRONTEND=noninteractive \
              ubuntu:24.04 \
              bash -euxc '
                  apt-get update
                  apt-get install -y --no-install-recommends ca-certificates
                  ./scripts/install-cycle /work/build/install-smoke
              '
