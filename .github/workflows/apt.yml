name: apt

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: apt-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-audit:
    name: dependency-audit
    runs-on: ubuntu-24.04
    steps:
      - name: Check out avalan-apt
        uses: actions/checkout@v4

      - name: Check out homebrew-avalan as a sibling
        uses: actions/checkout@v4
        with:
          repository: avalan-ai/homebrew-avalan
          path: homebrew-avalan-checkout

      - name: Place homebrew-avalan at the path check-dependencies expects
        run: mv homebrew-avalan-checkout ../homebrew-avalan

      - name: Install host tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ca-certificates \
            python3-packaging \
            wget

      - name: Fetch and overlay the upstream Avalan sdist
        run: scripts/prepare-source

      - name: Audit dependency-map.toml
        run: scripts/check-dependencies

  metadata-lint:
    name: metadata-lint
    runs-on: ubuntu-24.04
    steps:
      - name: Check out avalan-apt
        uses: actions/checkout@v4

      - name: Install host tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            ca-certificates \
            debhelper \
            devscripts \
            dh-python \
            dpkg-dev \
            fakeroot \
            lintian \
            pybuild-plugin-pyproject \
            python3-all \
            python3-all-dev \
            python3-build \
            python3-installer \
            python3-poetry-core \
            python3-poetry-dynamic-versioning \
            python3-pytest \
            wget

      - name: Prepare upstream sdist
        run: scripts/prepare-source

      - name: Source build (Avalan)
        run: |
          set -o pipefail
          scripts/build-source 2>&1 | tee build/build.log

      - name: Scan build log for forbidden network calls
        run: scripts/scan-build-log build/build.log

      - name: Lintian (pedantic, fail on warnings)
        run: scripts/lint-package

  dep-build:
    name: dep-build (${{ matrix.dep }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      # One cell per representative dep, covering the build backends
      # still in play after 1.4.8 trimmed the default profile:
      # setuptools (humanize) and setuptools+drop-rust-extension
      # (huggingface-hub) for pypi-sdist rows, plus jinja2 as the
      # debian-rebuild row whose upstream lintian profile diverges
      # from Noble's (sid omits Priority on its binary packages).
      # 1.4.8 dropped pandas/playwright/RestrictedPython/
      # youtube-transcript-api/tiktoken from the default profile and
      # relaxed enough ceilings that packaging/rich/fastapi/uvicorn/
      # aiomysql/asyncpg/matplotlib/sqlglot/sympy/pillow now resolve
      # from Noble, so their overlays and matrix cells are gone.
      matrix:
        dep:
          - google-auth
          - google-genai
          - humanize
          - huggingface-hub
          - jinja2
          - mcp
    steps:
      - name: Check out avalan-apt
        uses: actions/checkout@v4

      - name: Install host tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            ca-certificates \
            debhelper \
            devscripts \
            dh-python \
            dpkg-dev \
            fakeroot \
            flit \
            libfreetype-dev \
            libjpeg-dev \
            liblcms2-dev \
            libopenjp2-7-dev \
            libtiff-dev \
            libwebp-dev \
            lintian \
            openstack-pkg-tools \
            pybuild-plugin-pyproject \
            python3-aiohttp \
            python3-all \
            python3-all-dev \
            python3-babel \
            python3-cachetools \
            python3-cryptography \
            python3-flask \
            python3-hatch-fancy-pypi-readme \
            python3-hatch-vcs \
            python3-hatchling \
            python3-installer \
            python3-jwt \
            python3-markupsafe \
            python3-numpy \
            python3-openssl \
            python3-packaging \
            python3-pallets-sphinx-themes \
            python3-pdm-backend \
            python3-poetry-core \
            python3-pretend \
            python3-pyasn1 \
            python3-pyasn1-modules \
            python3-pygments \
            python3-pytest \
            python3-pytest-asyncio \
            python3-pytest-localserver \
            python3-pytest-mock \
            python3-pytest-runner \
            python3-pytest-xdist \
            python3-pyu2f \
            python3-requests \
            python3-responses \
            python3-rsa \
            python3-setuptools \
            python3-setuptools-scm \
            python3-sphinx \
            python3-sphinx-issues \
            python3-trio \
            quilt \
            wget \
            xz-utils \
            zlib1g-dev

      - name: Prepare ${{ matrix.dep }} source
        env:
          DEP: ${{ matrix.dep }}
        run: scripts/prepare-dep-source "$DEP"

      - name: Build ${{ matrix.dep }} binary .deb
        env:
          DEP: ${{ matrix.dep }}
        run: |
          set -o pipefail
          mkdir -p build/deps
          scripts/build-dep-package "$DEP" --mode binary 2>&1 \
            | tee "build/deps/${DEP}-build.log"

      - name: Scan build log for forbidden network calls
        env:
          DEP: ${{ matrix.dep }}
        run: scripts/scan-build-log "build/deps/${DEP}-build.log"

      - name: Lintian the .changes
        env:
          DEP: ${{ matrix.dep }}
        run: |
          set -e
          # PyPI name and Debian source name differ for some rows
          # (e.g. `packaging` -> `python-packaging`); each cell builds
          # exactly one source, so the binary .changes is the sole
          # non-_source.changes file under build/deps/.
          changes=$(ls -1 build/deps/*_*_*.changes | grep -v _source.changes | head -n1)
          test -n "$changes"
          # debian-rebuild rows ship sid's source unchanged; we don't
          # carry Avalan-specific patches, so we don't fail on
          # warnings that originate in the upstream source (e.g. sid's
          # jinja2 omits Priority on its binary packages). Errors
          # still gate.
          provenance=$(python3 -c "import os, tomllib; data = tomllib.load(open('debian/dependency-map.toml', 'rb')); print(next((d.get('provenance', '') for d in data['dep'] if d['pypi_name'] == os.environ['DEP']), ''))")
          fail_on=error,warning
          if [ "$provenance" = "debian-rebuild" ]; then
              fail_on=error
          fi
          lintian --pedantic --info --fail-on "$fail_on" "$changes"
