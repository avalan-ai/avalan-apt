sdist_sha256 = "d6c56277251adf6c2bdd25249feae625abe4966831676689ff23b4694dea5b12"
min_version = "1.40.46"
notes = "Aiobotocore 2.25.1's [boto3] extra ceilings boto3 at 1.40.62; matches botocore. Pin 1.40.61 sdist."

