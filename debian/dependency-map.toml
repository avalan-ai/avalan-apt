# Transitive of aioboto3 -- aioboto3 15.5.0 hard-pins
# `aiobotocore[boto3]==2.25.1`. aiobotocore in turn pins botocore in a
# tight `>=1.40.46,<1.40.62` window; Debian's snapshot pool jumps from
# 1.37.9+repack-1 straight to 1.40.68+repack-1, missing the entire
# window, so we cannot debian-rebuild the chain. Hand-package
# aiobotocore + botocore + boto3 + s3transfer + aioitertools from
# PyPI; Noble carries aiohttp, dateutil, jmespath, multidict, urllib3,
# wrapt, aiofiles at compatible versions.
[[dep]]
pypi_name = "aiobotocore"
constraint = "==2.25.1"
debian_name = "python3-aiobotocore"
extra = "vendors"
transitive_of = "aioboto3"
source = "ppa"
provenance = "pypi-sdist"
sdist_url = "https://files.pythonhosted.org/packages/62/94/2e4ec48cf1abb89971cb2612d86f979a6240520f0a659b53a43116d344dc/aiobotocore-2.25.1.tar.gz"
sdist_sha256 = "ea9be739bfd7ece8864f072ec99bb9ed5c7e78ebb2b0b15f29781fbe02daedbc"
min_version = "2.25.1"
notes = "Hard-pinned by aioboto3 15.5.0 (`aiobotocore[boto3]==2.25.1`); not in Debian. The Avalan-side debian/ ships a quilt patch that softens the build-system pin (setuptools >= 77 to plain setuptools), rewrites the PEP 639 SPDX license string back to the legacy `license = { file = ... }` table form, drops the Python 3.14 trove classifier, and relaxes the aiohttp runtime floor from 3.9.2 to 3.9.1 so Noble's archive resolves."

# Transitive of aioboto3 -- aiobotocore 2.25.1 needs botocore in
# `>=1.40.46,<1.40.62`. Noble ships 1.34.46+repack and the Debian
# snapshot pool has no version in the window, so we pypi-sdist 1.40.61
# (the top of the window). botocore's runtime deps (jmespath,
# python-dateutil, urllib3) are all in Noble at compatible versions.
[[dep]]
pypi_name = "botocore"
constraint = ">=1.40.46,<1.40.62"
debian_name = "python3-botocore"
extra = "vendors"
transitive_of = "aioboto3"
source = "ppa"
provenance = "pypi-sdist"
sdist_url = "https://files.pythonhosted.org/packages/28/a3/81d3a47c2dbfd76f185d3b894f2ad01a75096c006a2dd91f237dca182188/botocore-1.40.61.tar.gz"
sdist_sha256 = "a2487ad69b090f9cccd64cf07c7021cd80ee9c0655ad974f87045b02f3ef52cd"
min_version = "1.40.46"
notes = "Aiobotocore 2.25.1 ceilings botocore at 1.40.62; Noble ships 1.34.46 and the Debian snapshot pool's nearest higher version is 1.40.68 (above the ceiling). Pin 1.40.61 sdist."

# Transitive of aioboto3 -- boto3 lives next to botocore at the same
# version cadence. aiobotocore[boto3] 2.25.1 ceilings boto3 at
# 1.40.62; we pin 1.40.61, matching botocore.
[[dep]]
pypi_name = "boto3"
constraint = ">=1.40.46,<1.40.62"
debian_name = "python3-boto3"
extra = "vendors"
transitive_of = "aioboto3"
