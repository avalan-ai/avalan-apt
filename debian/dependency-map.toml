# Machine-readable inventory of Avalan's runtime Python dependencies and how
# each one is sourced on Ubuntu Noble. One [[dep]] block per upstream
# dependency.
#
# `source` is `noble` or `ppa`. For every `ppa` row, `provenance` is one
# of `debian-rebuild` (rebuild the Debian source package recorded in
# `debian_source_pkg`/`debian_suite`/`debian_version` into our PPA) or
# `pypi-sdist` (hand-package the upstream tarball at
# `sdist_url`/`sdist_sha256`). The audit script
# (scripts/check-dependencies) verifies the metadata here against the
# upstream pyproject + Homebrew formula and, when run on a Noble host,
# against `apt-cache madison` and the configured PPA index.

[meta]
upstream_version = "1.4.7"
# Commit in homebrew-avalan that introduced the upstream pin this map
# matches. CI's parity check re-derives extras + constraints from the
# formula at this sha and compares against this inventory.
homebrew_formula_sha = "d3802930b44c2aad088c14fddb2fc5b12e880076"

# --- Base (always installed by upstream) ------------------------------------

[[dep]]
pypi_name = "packaging"
constraint = ">=25.0,<26.0"
debian_name = "python3-packaging"
extra = "base"
source = "ppa"
provenance = "debian-rebuild"
debian_source_pkg = "python-packaging"
debian_suite = "bookworm-backports"
debian_version = "25.0-1~bpo12+1"
min_version = "25.0"
notes = "Noble ships 24.0 (below floor); rebuild bookworm-backports 25.0-1~bpo12+1 into the PPA. Debian sid is 26.0 (above ceiling)."

