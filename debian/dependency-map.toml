# Machine-readable inventory of Avalan's runtime Python dependencies and how
# each one is sourced on Ubuntu Noble. One [[dep]] block per upstream
# dependency.
#
# `source` is `noble` or `ppa`. For every `ppa` row, `provenance` is one
# of `debian-rebuild` (rebuild the Debian source package recorded in
# `debian_source_pkg`/`debian_suite`/`debian_version` into our PPA) or
# `pypi-sdist` (hand-package the upstream tarball at
# `sdist_url`/`sdist_sha256`). The audit script
# (scripts/check-dependencies) verifies the metadata here against the
# upstream pyproject + Homebrew formula and, when run on a Noble host,
# against `apt-cache madison` and the configured PPA index.

[meta]
upstream_version = "1.4.8"
# Commit in homebrew-avalan that introduced the upstream pin this map
# matches. CI's parity check re-derives extras + constraints from the
# formula at this sha and compares against this inventory. The 1.4.8
# upstream loosens many constraints (and drops several deps out of the
# default profile); the Homebrew formula has not yet been bumped, so
# this still points at the 1.4.7 commit. The EXTRAS list is unchanged
# between the two releases, so the parity check stays meaningful.
homebrew_formula_sha = "d3802930b44c2aad088c14fddb2fc5b12e880076"

# --- Base (always installed by upstream) ------------------------------------

[[dep]]
pypi_name = "packaging"
constraint = ">=24.0,<27.0"
debian_name = "python3-packaging"
extra = "base"
source = "noble"
min_version = "24.0"
notes = "Noble ships 24.0-1, exactly the new floor. 1.4.8 widened the ceiling to <27.0 so the rebuild we used to need is no longer required."

[[dep]]
pypi_name = "humanize"
constraint = ">=4.12.3,<5.0.0"
debian_name = "python3-humanize"
extra = "base"
source = "ppa"
provenance = "pypi-sdist"
sdist_url = "https://files.pythonhosted.org/packages/22/d1/bbc4d251187a43f69844f7fd8941426549bbe4723e8ff0a7441796b0789f/humanize-4.12.3.tar.gz"
sdist_sha256 = "8430be3a615106fdfceb0b2c1b41c4c98c6b0fc5cc59663a5539b111dd325fb0"
min_version = "4.12.3"
notes = "Noble ships 4.9.0 and Debian sid ships 4.12.1 (both below floor); pin 4.12.3 sdist."

[[dep]]
pypi_name = "rich"
constraint = ">=13.7.0,<16.0.0"
debian_name = "python3-rich"
extra = "base"
source = "noble"
min_version = "13.7.0"
notes = "Noble ships 13.7.1-1, exactly inside the widened 1.4.8 range (>=13.7.0,<16.0.0)."

